name: Sync Runtime Catalog

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}

      - uses: actions/setup-go@v7
        with:
          go-version: '1.26'

      - name: Sync runtime catalog
        run: go run ./tools/sync-catalog/
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}

      - name: Commit if changed
        run: |
          if ! git diff --exit-code docs/runtime-catalog.json; then
            git config user.name "npu-optimize bot"
            git config user.email "bot@npu-optimize.dev"
            git add docs/runtime-catalog.json
            git commit -m "chore: sync runtime catalog ($(date +%Y-%m-%d))"
            git push
          else
            echo "no changes"
          fi
