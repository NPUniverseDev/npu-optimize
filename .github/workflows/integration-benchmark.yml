name: Integration Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
      - name: Install llama.cpp tools
        run: |
          sudo apt-get update
          sudo apt-get install -y llama.cpp
      - name: Run integration tests
        env:
          NPU_OPTIMIZE_LLAMA_BENCH: /usr/bin/llama-bench
        run: |
          echo "Skipping proxy download in CI by default; set NPU_OPTIMIZE_PROXY_MODEL to enable full run"
          go test -tags=integration ./internal/llamabench -v -count=1
