version: "2"
run:
  timeout: 3m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - os.Remove
        - os.Setenv
        - os.Unsetenv
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
