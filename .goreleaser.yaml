version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/npu-optimize
    binary: npu-optimize
    ldflags:
      - -X github.com/Ericson246/npu-optimize/internal/constants.Version={{ .Version }}
      - -X github.com/Ericson246/npu-optimize/internal/constants.UserAgent=npu-optimize/{{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^refactor:"
